<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hernán De Souza — redirigiendo al perfil</title>
  <meta name="theme-color" content="#008859" />
  <meta name="robots" content="noindex, follow" />

  <!-- Single source of truth: the GitHub profile. This vanity URL just points there. -->
  <link rel="canonical" href="https://github.com/soyerno" />
  <meta http-equiv="refresh" content="0; url=https://github.com/soyerno" />

  <style>
    :root { --green: #008859; --green-2: #00b894; }
    html { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100svh;
      display: grid; place-items: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-2) 100%);
      color: #fff; text-align: center; padding: 24px;
    }
    .card { max-width: 28rem; }
    h1 { font-size: clamp(1.4rem, 4vw, 1.9rem); margin: 0 0 8px; }
    p { margin: 0 0 20px; opacity: .95; line-height: 1.6; }
    a.btn {
      display: inline-block; padding: 12px 22px; border-radius: 999px;
      background: #fff; color: var(--green); text-decoration: none; font-weight: 700;
    }
    a.btn:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hernán De Souza</h1>
    <p>Me mudé. Toda mi info vive ahora en un solo lugar: mi perfil de GitHub.</p>
    <a class="btn" href="https://github.com/soyerno">Ir al perfil →</a>
  </main>
  <script>location.replace("https://github.com/soyerno");</script>
</body>
</html>
